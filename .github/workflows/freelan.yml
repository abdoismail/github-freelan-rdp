name: Windows RDP via Freelan

on:
  workflow_dispatch:
    inputs:
      ip:
        description: 'Public IP Address'
        required: true
      passphrase:
        description: 'Passphrase'
        required: true
        default: 'ff12341234'
      runner_os:
        description: 'Windows version'
        required: true
        default: 'windows-latest'
        type: choice
        options:
          - windows-latest
          - windows-2022
      install_programs:
        description: 'Install programs?'
        required: true
        default: false
        type: boolean
      install_qbittorrent:
        description: '  ↳ qBittorrent'
        required: false
        default: false
        type: boolean
      install_idm:
        description: '  ↳ Internet Download Manager'
        required: false
        default: false
        type: boolean
      install_steam:
        description: '  ↳ Steam'
        required: false
        default: false
        type: boolean

jobs:
  rdp-setup:
    runs-on: ${{ github.event.inputs.runner_os }}
    timeout-minutes: 360
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install TAP Driver
        run: |
          .\driver\devcon.exe install .\driver\OemVista.inf tap0901

      - name: Create Admin User
        run: |
          net user john Ff12341234@ /add
          net localgroup administrators john /add

      - name: Bootstrap winget
        if: ${{ github.event.inputs.runner_os == 'windows-2022' }}
        shell: powershell
        run: |
          $progressPreference = 'silentlyContinue'
          Write-Host "Installing VCLibs..."
          Add-AppxPackage "https://aka.ms/Microsoft.VCLibs.x64.14.00.Desktop.appx"
          Write-Host "Installing Microsoft.UI.Xaml..."
          Invoke-WebRequest -Uri "https://github.com/microsoft/microsoft-ui-xaml/releases/download/v2.8.6/Microsoft.UI.Xaml.2.8.x64.appx" -OutFile "xaml.appx"
          Add-AppxPackage "xaml.appx"
          Write-Host "Installing Windows App Runtime..."
          Invoke-WebRequest -Uri "https://aka.ms/windowsappsdk/1.8/1.8.260317003/windowsappruntimeinstall-x64.exe" -OutFile "windowsappruntimeinstall.exe"
          .\windowsappruntimeinstall.exe --quiet
          Write-Host "Installing winget..."
          Invoke-WebRequest -Uri "https://github.com/microsoft/winget-cli/releases/latest/download/Microsoft.DesktopAppInstaller_8wekyb3d8bbwe.msixbundle" -OutFile "winget.msixbundle"
          Add-AppxPackage "winget.msixbundle"
          Write-Host "Verifying winget..."
          winget --version
          
      - name: Install qBittorrent
        if: ${{ github.event.inputs.install_programs == 'true' && github.event.inputs.install_qbittorrent == 'true' }}
        run: |
          winget install --id qBittorrent.qBittorrent --silent --accept-package-agreements --accept-source-agreements

      - name: Install Internet Download Manager
        if: ${{ github.event.inputs.install_programs == 'true' && github.event.inputs.install_idm == 'true' }}
        run: |
          winget install --id Tonec.InternetDownloadManager --silent --accept-package-agreements --accept-source-agreements

      - name: Install Steam
        if: ${{ github.event.inputs.install_programs == 'true' && github.event.inputs.install_steam == 'true' }}
        run: |
          winget install --id Valve.Steam --silent --accept-package-agreements --accept-source-agreements

      - name: Start Freelan
        run: |
          .\freelan\freelan.exe --security.passphrase "${{ github.event.inputs.passphrase }}" --tap_adapter.ipv4_address_prefix_length 9.0.0.2/24 --fscp.contact "${{ github.event.inputs.ip }}:12000"
