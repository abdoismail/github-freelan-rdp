name: Windows RDP via Freelan

on:
  workflow_dispatch:
    inputs:
      ip:
        description: 'Public IP Address'
        required: true
      passphrase:
        description: 'Passphrase'
        required: true
        default: 'ff12341234'

jobs:
  rdp-setup:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
        
    - name: Install TAP Driver
      run: |
        .\driver\devcon.exe install .\driver\OemVista.inf tap0901
    
    - name: Create Admin User
      run: |
        net user john Ff12341234@ /add
        net localgroup administrators john /add
    - name: Install Programs
      run: |
        winget install --id qBittorrent.qBittorrent --silent --accept-package-agreements --accept-source-agreements
        winget install --id Tonec.InternetDownloadManager --silent --accept-package-agreements --accept-source-agreements
        winget install --id Valve.Steam --silent --accept-package-agreements --accept-source-agreements
        .\steamtools.exe /S
        
    - name: Start Freelan
      run: |
        .\freelan\freelan.exe --security.passphrase "${{github.event.inputs.passphrase}}" --tap_adapter.ipv4_address_prefix_length 9.0.0.2/24 --fscp.contact "${{github.event.inputs.ip}}:12000"