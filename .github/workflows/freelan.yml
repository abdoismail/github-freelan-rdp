name: Windows RDP via Freelan

on:
  workflow_dispatch:
    inputs:
      ip:
        description: 'Public IP Address'
        required: true
      passphrase:
        description: 'Passphrase'
        required: true
        default: 'ff12341234'
      runner_os:
        description: 'Windows version'
        required: true
        default: 'windows-latest'
        type: choice
        options:
          - windows-latest
          - windows-2022
          - windows-gpu-runner
      install_programs:
        description: 'Install programs?'
        required: true
        default: false
        type: boolean
      install_qbittorrent:
        description: '  ↳ qBittorrent'
        required: false
        default: false
        type: boolean
      install_idm:
        description: '  ↳ Internet Download Manager'
        required: false
        default: false
        type: boolean
      install_steam:
        description: '  ↳ Steam'
        required: false
        default: false
        type: boolean

jobs:
  rdp-setup:
    runs-on: ${{ github.event.inputs.runner_os }}
    timeout-minutes: 360
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install TAP Driver
        run: |
          .\driver\devcon.exe install .\driver\OemVista.inf tap0901
      - name: Create Admin User
        run: |
          net user john Ff12341234@ /add
          net localgroup administrators john /add
          
      - name: Install winget
        if: ${{ github.event.inputs.install_programs == 'true' }}
        uses: Cyberboss/install-winget@v1
          
      - name: Install qBittorrent
        if: ${{ github.event.inputs.install_programs == 'true' && github.event.inputs.install_qbittorrent == 'true' }}
        run: |
          winget install --id qBittorrent.qBittorrent --source winget --silent --accept-package-agreements --accept-source-agreements
      - name: Install Internet Download Manager
        if: ${{ github.event.inputs.install_programs == 'true' && github.event.inputs.install_idm == 'true' }}
        run: |
          winget install --id Tonec.InternetDownloadManager --source winget --silent --accept-package-agreements --accept-source-agreements
      - name: Install Steam
        if: ${{ github.event.inputs.install_programs == 'true' && github.event.inputs.install_steam == 'true' }}
        run: |
          winget install --id Valve.Steam --silent --source winget --accept-package-agreements --accept-source-agreements
      - name: Start Freelan
        run: |
          $process = Start-Process -FilePath ".\freelan\freelan.exe" `
            -ArgumentList '--security.passphrase "${{ github.event.inputs.passphrase }}" --tap_adapter.ipv4_address_prefix_length 9.0.0.2/24 --fscp.contact "${{ github.event.inputs.ip }}:12000"' `
            -NoNewWindow -PassThru
          $process.PriorityClass = [System.Diagnostics.ProcessPriorityClass]::RealTime
          Write-Host "Freelan started with PID $($process.Id) at $($process.PriorityClass) priority"
          $process.WaitForExit()
